repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --force-exclude
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: ruff format --check --force-exclude
        language: system
        types: [python]

      - id: ty-check
        name: ty check
        entry: ty check
        language: system
        types: [python]
        pass_filenames: false
